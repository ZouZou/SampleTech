name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore InsurancePlatform.slnx

      - name: Build
        run: dotnet build InsurancePlatform.slnx --no-restore -c Release

      - name: Run tests
        run: >
          dotnet test InsurancePlatform.slnx
          --no-build
          -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/TestResults/*.trx

  frontend-build:
    name: Frontend (Angular 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Requires ESLint schematic to be added (ng add @angular-eslint/schematics)
        run: npx ng lint
        continue-on-error: true

      - name: Unit tests (Vitest)
        run: npx ng test --watch=false

      - name: Build (production)
        run: npx ng build

  docker-build:
    name: Docker Build (validate)
    runs-on: ubuntu-latest
    needs: [backend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: insurance-platform-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
