name: CD – Staging

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Only one staging deployment at a time
concurrency:
  group: cd-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Build, Push & Deploy to Staging
    runs-on: ubuntu-latest
    # Only proceed if CI passed
    if: github.event.workflow_run.conclusion == 'success'

    environment:
      name: staging
      url: https://staging.insurance-platform.internal

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # --- Registry login (GHCR) ---
      # Switch to AWS ECR by replacing this step and the push tag below.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/insurance-platform-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/insurance-platform-api:latest-staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # --- Deploy placeholder ---
      # Replace this step with kubectl rollout, ECS update, or your deploy mechanism
      # once the staging environment is provisioned (JAB target: 60-day milestone).
      - name: Deploy to staging (placeholder)
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository_owner }}/insurance-platform-api:${{ github.sha }}"
          echo "TODO: wire up kubectl / ECS / Helm deploy once staging cluster is ready."
          echo "See docs/github-secrets.md for required secrets."

      - name: Post deployment summary
        run: |
          echo "### Staging Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`ghcr.io/${{ github.repository_owner }}/insurance-platform-api:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by commit:** ${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** image pushed, deploy step pending cluster provisioning" >> "$GITHUB_STEP_SUMMARY"
