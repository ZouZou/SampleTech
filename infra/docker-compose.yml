version: '3.9'
# SampleTech Insurance Platform — Local Development Compose
#
# Copy .env.example to .env and fill in values before running.
# Never commit .env — it contains local secrets.
#
#   cp infra/.env.example infra/.env
#   docker compose -f infra/docker-compose.yml up

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sampletech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.example}
      POSTGRES_DB: ${POSTGRES_DB:-sampletech}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sampletech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sampletech};Username=${POSTGRES_USER:-sampletech};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required — see .env.example}
      Jwt__Issuer: "sampletech-api"
      Jwt__Audience: "sampletech-clients"
      AllowedOrigins__0: "http://localhost:4200"
    ports:
      - "${API_PORT:-5000}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: ../frontend/admin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - api

volumes:
  postgres_data:
